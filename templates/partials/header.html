<header class="surface-header border-b border-soft px-5 py-4 backdrop-blur md:px-8">
    <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
        <div class="min-w-0">
            <h1 id="chatTitle" class="truncate text-2xl font-semibold">Local Dual Chat Desktop</h1>
            <p class="mt-1 text-sm text-secondary">
                One prompt, two engines: ChatGPT through Brave on the left, Ollama on the right.
            </p>
        </div>
        <div class="flex flex-wrap gap-2">
            <button
                id="themeToggle"
                type="button"
                class="secondary-button rounded-2xl px-4 py-2 text-sm font-semibold transition"
            >
                Light Mode
            </button>
            <div id="chatgptStatus" class="status-badge rounded-full px-3 py-1 text-sm">Checking ChatGPT...</div>
            <div id="ollamaStatus" class="status-badge rounded-full px-3 py-1 text-sm">Checking Ollama...</div>
        </div>
    </div>
</header>
