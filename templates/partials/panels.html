<section class="grid min-h-0 flex-1 gap-4 p-4 md:p-6 xl:grid-cols-2">
    <div class="surface-panel flex min-h-0 flex-col overflow-hidden rounded-[1.8rem] border border-soft shadow-soft">
        <div class="border-b border-soft px-5 py-4">
            <div class="flex items-center justify-between gap-3">
                <div>
                    <p class="text-xs uppercase tracking-[0.24em] text-muted">Left Panel</p>
                    <h2 class="mt-1 text-lg font-semibold">ChatGPT via Brave</h2>
                </div>
                <span class="status-badge status-connected rounded-full px-3 py-1 text-xs font-medium">
                    Playwright
                </span>
            </div>
        </div>
        <div id="chatgptPanel" class="chat-stream flex-1 overflow-y-auto px-4 py-4 md:px-5"></div>
    </div>

    <div class="surface-panel flex min-h-0 flex-col overflow-hidden rounded-[1.8rem] border border-soft shadow-soft">
        <div class="border-b border-soft px-5 py-4">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                    <p class="text-xs uppercase tracking-[0.24em] text-muted">Right Panel</p>
                    <h2 class="mt-1 text-lg font-semibold">Local Model</h2>
                </div>
                <label class="surface-card border-soft flex items-center gap-3 rounded-2xl border px-3 py-2 text-sm text-secondary">
                    <span>Model</span>
                    <select
                        id="ollamaModelSelect"
                        class="min-w-[180px] bg-transparent text-sm text-primary outline-none"
                    >
                        {% if initial_shell.ollama_models %}
                            {% for model in initial_shell.ollama_models %}
                                <option
                                    value="{{ model.name }}"
                                    {% if model.name == initial_shell.default_ollama_model %}selected{% endif %}
                                >
                                    {{ model.name }}
                                </option>
                            {% endfor %}
                        {% else %}
                            <option value="">No local models found</option>
                        {% endif %}
                    </select>
                </label>
            </div>
        </div>
        <div id="ollamaPanel" class="chat-stream flex-1 overflow-y-auto px-4 py-4 md:px-5"></div>
    </div>
</section>
