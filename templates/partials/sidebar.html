<aside id="sidebar" class="history-sidebar surface-sidebar flex w-full flex-col border-r border-soft backdrop-blur">
    <div class="sidebar-shell">
        <div class="sidebar-top">
            <div class="sidebar-brand">
                <div class="sidebar-brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3.75c2.28-1.3 5.21-.52 6.53 1.74 1.32 2.27.54 5.15-1.74 6.44l-.72.41.73.42c2.27 1.3 3.03 4.16 1.72 6.42-1.32 2.26-4.24 3.04-6.52 1.73l-.73-.42-.72.42c-2.28 1.3-5.21.52-6.53-1.74-1.32-2.27-.54-5.15 1.74-6.44l.72-.41-.73-.42C3.26 10.3 2.5 7.44 3.82 5.18c1.32-2.26 4.24-3.04 6.52-1.73l.73.42.72-.42Z"/>
                    </svg>
                </div>
                <div class="sidebar-brand-text">Freeloader Trainee</div>
            </div>
            <button
                id="sidebarHandleButton"
                type="button"
                class="sidebar-handle secondary-button rounded-2xl text-sm font-semibold transition"
                aria-label="Close sidebar"
            >
                <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3.5" y="4.5" width="17" height="15" rx="2.5"></rect>
                    <path d="M9 4.5v15"></path>
                </svg>
            </button>
        </div>

        <div class="sidebar-nav">
            <button
                id="newChatButton"
                class="sidebar-action is-primary transition"
            >
                <span class="sidebar-action-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                </span>
                <span class="sidebar-action-label">New chat</span>
            </button>
            <button
                id="searchToggleButton"
                type="button"
                class="sidebar-action transition"
            >
                <span class="sidebar-action-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="6.5"></circle>
                        <path d="m16 16 4.5 4.5"></path>
                    </svg>
                </span>
                <span class="sidebar-action-label">Search</span>
            </button>
            <button
                id="historyToggleButton"
                type="button"
                class="sidebar-action transition"
            >
                <span class="sidebar-action-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.5 12a7.5 7.5 0 1 0 2.2-5.3"></path>
                        <path d="M4.5 4.5v4h4"></path>
                        <path d="M12 8.5v4l2.5 1.7"></path>
                    </svg>
                </span>
                <span class="sidebar-action-label">History</span>
            </button>
        </div>

        <div id="searchPanel" class="sidebar-dropdown mt-4 rounded-2xl border border-soft px-3 py-3">
            <label class="block">
                <span class="sidebar-section-label">Search</span>
                <input
                    id="chatSearchInput"
                    type="search"
                    class="app-input mt-2 w-full rounded-2xl px-4 py-3 text-sm outline-none"
                    placeholder="Search chats, prompts, and replies. Spaces are optional..."
                >
            </label>
        </div>

        <div id="historyPanel" class="sidebar-region mt-5">
            <div class="flex items-center justify-between px-2">
                <div>
                    <div class="sidebar-section-label mb-1">Recents</div>
                    <p id="chatSubtitle" class="text-sm text-secondary">Fuzzy search across titles, prompts, and replies. Spaces are optional.</p>
                </div>
                <span id="chatCount" class="badge-count rounded-full px-2 py-1 text-xs">0</span>
            </div>
            <div id="chatList" class="chat-history-list mt-3 h-full overflow-y-auto px-2 pb-2"></div>
        </div>
    </div>
</aside>
